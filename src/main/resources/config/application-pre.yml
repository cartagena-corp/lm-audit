spring:
  application:
    name: lm-audit
  datasource:
    url: jdbc:postgresql://localhost:5433/lamuralla
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
server:
  port: '8083'
app:
  cors:
    allowed-origins: https://cartagenacorporation.com,https://www.cartagenacorporation.com,http://localhost:3000,http://127.0.0.1:3000
  jwt:
    secret: ${JWT_SECRET}
auth:
  service:
    url: http://localhost:8081/api/oauth
config:
  service:
    url: http://localhost:8088/api/config
